  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Participa en la quiniela del Mundial 2026: predice marcadores, suma puntos y compite por el podio." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Quiniela Mundial 2026 ⚽" />
    <meta property="og:description" content="Predice los partidos del Mundial 2026, compite con tus amigos y gana premios." />
    <meta property="og:url" content="https://quiniela-mundial.pages.dev" />
    <meta property="og:image" content="https://quiniela-mundial.pages.dev/og-cover.png" />
    <meta property="og:site_name" content="Quiniela Mundial 2026" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%E2%9A%BD%EF%B8%8F%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Twemoji: arregla emojis de banderas en Windows/Chrome -->
    <!-- Twemoji: solo para banderas en Windows/Chrome -->
    <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script>
      function applyTwemoji() {
        var flags = document.querySelectorAll('.team-flag, .host-flag');
        flags.forEach(function(el) {
          twemoji.parse(el, {
            folder: 'svg',
            ext: '.svg',
            base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/'
          });
        });
      }
      document.addEventListener('DOMContentLoaded', function () {
        applyTwemoji();
        var observer = new MutationObserver(applyTwemoji);
        observer.observe(document.getElementById('root'), {
          childList: true,
          subtree: true
        });
      });
    </script>
  </body>
</html>
